# Extends gitleaks' default ruleset (150+ patterns) with wallet-key patterns
# that generic scanners miss — the highest-stakes secrets in trading repos.
[extend]
useDefault = true

# EVM private key next to a key-like identifier. The keyword guard avoids
# false positives on tx hashes (also 0x + 64 hex).
[[rules]]
id = "evm-private-key"
description = "EVM private key near a key-like identifier"
regex = '''(?i)(private[_-]?key|priv[_-]?key|secret[_-]?key|signer[_-]?key)\s*[=:"']{1,3}\s*(0x)?[a-fA-F0-9]{64}'''

# Solana keypair exported as a 64-byte JSON array (the id.json format).
[[rules]]
id = "solana-keypair-array"
description = "Solana keypair as 64-byte JSON array"
regex = '''\[\s*(?:\d{1,3}\s*,\s*){63}\d{1,3}\s*\]'''

# Seed phrase next to a mnemonic-like identifier.
[[rules]]
id = "mnemonic-phrase"
description = "BIP-39 mnemonic near a key-like identifier"
regex = '''(?i)(mnemonic|seed[_-]?phrase)\s*[=:"']{1,3}\s*([a-z]+\s+){11,23}[a-z]+'''

[allowlist]
description = "Files that legitimately contain key-shaped strings"
paths = [
  '''\.env\.example$''',
  '''package-lock\.json$''',
  '''node_modules/''',
  '''dist/''',
]
