# Dependency updates with a supply-chain cooldown.
# The cooldown delays version bumps until a release has been public for N days —
# npm worm attacks (Shai-Hulud class) spread within hours of a compromised publish,
# and are usually caught within a day or two. Security updates BYPASS the cooldown.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
      semver-major-days: 14
    open-pull-requests-limit: 5

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
